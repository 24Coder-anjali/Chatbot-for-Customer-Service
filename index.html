<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Service Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section class="chat-panel" aria-label="Customer service chatbot">
      <header class="chat-header">
        <div>
          <p class="eyebrow">AI Internship Project</p>
          <h1>Customer Service Chatbot</h1>
        </div>
        <span class="status">Online</span>
      </header>

      <div class="quick-actions" aria-label="Sample questions">
        <button type="button" data-message="Where is my order?">Track order</button>
        <button type="button" data-message="What is your return policy?">Return policy</button>
        <button type="button" data-message="My payment failed but money was deducted">Payment issue</button>
        <button type="button" data-message="Talk to a human support agent">Agent help</button>
      </div>

      <div id="chatLog" class="chat-log" aria-live="polite">
        <article class="message bot">
          <p>Hello! I can help with orders, returns, refunds, payments, delivery, cancellations, and support timings.</p>
        </article>
      </div>

      <form id="chatForm" class="chat-form">
        <input id="messageInput" type="text" placeholder="Type your customer query..." autocomplete="off" required>
        <button type="submit">Send</button>
      </form>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
